<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Studio V3 - Multi-Format</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #22d3ee;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
        }

        .controls {
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 92vh;
            overflow-y: auto;
        }

        .preview-area {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        canvas {
            max-width: 100%;
            max-height: 70vh; /* Asegura que quepa en pantalla al editar vertical */
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            background: #000;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; margin-bottom: 6px; }
        
        select, input[type="range"], input[type="color"], input[type="number"] {
            width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white;
        }

        .res-indicator {
            font-size: 0.7rem; color: var(--accent); margin-top: 8px; font-family: monospace;
        }

        button {
            width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s;
        }

        #renderBtn { background: var(--primary); color: white; }
        #renderBtn:disabled { background: #475569; opacity: 0.6; }

        .recording-status { color: #fb7185; font-size: 0.85rem; margin-top: 15px; display: none; text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
        .back-nav {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: #334155;
            color: #f8fafc;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #475569;
        }
        .back-btn:hover {
            background: #475569;
            transform: translateX(-3px);
        }
    
    </style>
</head>
<body>
    <div class="back-nav"><a href="index.html" class="back-btn">← Volver al Menú Principal</a></div>

    <h1 style="font-weight: 800; margin-bottom: 20px;">Background Studio V3</h1>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Orientación</label>
                <select id="orientation">
                    <option value="horizontal">Horizontal (Paisaje)</option>
                    <option value="vertical">Vertical (TikTok/Shorts)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Calidad</label>
                <select id="quality">
                    <option value="720">HD (720p)</option>
                    <option value="1080">Full HD (1080p)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Figura</label>
                <select id="shapeType">
                    <option value="heart">Corazón ❤️</option>
                    <option value="star">Estrella ⭐</option>
                    <option value="book">Libro 📖</option>
                    <option value="triangle">Triángulo</option>
                    <option value="square">Cuadrado</option>
                    <option value="pentagon">Pentágono</option>
                    <option value="hexagon">Hexágono</option>
                    <option value="circle">Círculo</option>
                </select>
            </div>

            <div class="control-group">
                <label>Estilo</label>
                <select id="drawStyle">
                    <option value="fill">Relleno Sólido</option>
                    <option value="stroke">Solo Contorno</option>
                    <option value="glow">Efecto Neón (Glow)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Colores</label>
                <div style="display: flex; gap: 5px;">
                    <input type="color" id="baseColor" value="#0f172a">
                    <input type="color" id="elemColor" value="#6366f1">
                </div>
            </div>

            <div class="control-group">
                <label>Densidad</label>
                <input type="range" id="density" min="10" max="250" value="60">
            </div>

            <div class="control-group">
                <label>Velocidad</label>
                <input type="range" id="speed" min="0.1" max="4" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>Tamaño</label>
                <input type="range" id="size" min="5" max="150" value="40">
            </div>

            <div class="control-group">
                <label>Duración (seg)</label>
                <input type="number" id="duration" value="10" min="1">
            </div>
            
            <button id="renderBtn">Exportar Video</button>
            <div id="status" class="recording-status">● GRABANDO...</div>
        </div>

        <div class="preview-area">
            <canvas id="canvas" width="1280" height="720"></canvas>
            <div id="resLabel" class="res-indicator">ACTUAL: 1280 x 720 px</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const oriSelect = document.getElementById('orientation');
        const quaSelect = document.getElementById('quality');
        const resLabel = document.getElementById('resLabel');
        
        let particles = [];
        let animationId;

        function updateResolution() {
            const isVertical = oriSelect.value === 'vertical';
            const quality = parseInt(quaSelect.value);
            
            let w, h;
            if (quality === 1080) {
                w = isVertical ? 1080 : 1920;
                h = isVertical ? 1920 : 1080;
            } else {
                w = isVertical ? 720 : 1280;
                h = isVertical ? 1280 : 720;
            }

            canvas.width = w;
            canvas.height = h;
            resLabel.textContent = `ACTUAL: ${w} x ${h} px`;
            initParticles();
        }

        oriSelect.onchange = updateResolution;
        quaSelect.onchange = updateResolution;

        function drawShape(type, size) {
            ctx.beginPath();
            switch(type) {
                case 'heart':
                    ctx.moveTo(0, size / 4);
                    ctx.bezierCurveTo(0, 0, -size, 0, -size, size / 2);
                    ctx.bezierCurveTo(-size, size, 0, size * 1.2, 0, size * 1.5);
                    ctx.bezierCurveTo(0, size * 1.2, size, size, size, size / 2);
                    ctx.bezierCurveTo(size, 0, 0, 0, 0, size / 4);
                    break;
                case 'star':
                    for(let i=0; i<10; i++) {
                        let r = (i % 2 === 0) ? size : size/2;
                        let a = (Math.PI * 2 / 10) * i - Math.PI/2;
                        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    }
                    break;
                case 'book':
                    ctx.rect(-size, -size/1.5, size, size*1.2);
                    ctx.rect(0, -size/1.5, size, size*1.2);
                    ctx.moveTo(0, -size/1.5); ctx.lineTo(0, size/1.5);
                    break;
                case 'circle': ctx.arc(0, 0, size, 0, Math.PI*2); break;
                default:
                    const sides = {triangle:3, square:4, pentagon:5, hexagon:6}[type] || 3;
                    for(let i=0; i<sides; i++) {
                        let a = (Math.PI * 2 / sides) * i - Math.PI/2;
                        ctx.lineTo(Math.cos(a)*size, Math.sin(a)*size);
                    }
            }
            ctx.closePath();
        }

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpd = (Math.random() - 0.5) * 0.04;
                this.baseSize = Math.random() * 0.6 + 0.4;
            }
            update(speed) {
                this.x += this.vx * speed;
                this.y += this.vy * speed;
                this.rotation += this.rotSpd * speed;
                
                const margin = 150;
                if(this.x < -margin) this.x = canvas.width + margin;
                if(this.x > canvas.width + margin) this.x = -margin;
                if(this.y < -margin) this.y = canvas.height + margin;
                if(this.y > canvas.height + margin) this.y = -margin;
            }
            draw() {
                const type = document.getElementById('shapeType').value;
                const style = document.getElementById('drawStyle').value;
                const color = document.getElementById('elemColor').value;
                const sizeGlobal = parseInt(document.getElementById('size').value);
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                drawShape(type, sizeGlobal * this.baseSize);
                
                ctx.fillStyle = color;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;

                if(style === 'fill') {
                    ctx.fill();
                } else if(style === 'stroke') {
                    ctx.stroke();
                } else { // Glow
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = color;
                    ctx.stroke();
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = parseInt(document.getElementById('density').value);
            for(let i=0; i<count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = document.getElementById('baseColor').value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const speed = parseFloat(document.getElementById('speed').value);
            particles.forEach(p => { p.update(speed); p.draw(); });
            animationId = requestAnimationFrame(animate);
        }

        document.getElementById('density').oninput = initParticles;
        document.getElementById('renderBtn').onclick = async () => {
            const stream = canvas.captureStream(60);
            const recorder = new MediaRecorder(stream, { 
                mimeType: 'video/webm; codecs=vp9', 
                videoBitsPerSecond: 15000000 
            });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `bg_v3_${document.getElementById('orientation').value}.webm`;
                a.click();
                document.getElementById('renderBtn').disabled = false;
                document.getElementById('status').style.display = 'none';
            };
            document.getElementById('renderBtn').disabled = true;
            document.getElementById('status').style.display = 'block';
            recorder.start();
            setTimeout(() => recorder.stop(), parseInt(document.getElementById('duration').value) * 1000);
        };

        updateResolution();
        animate();
    </script>
</body>
</html>
