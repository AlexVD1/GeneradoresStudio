<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Video – GeneradorStudio</title>
    <meta name="description" content="Editor de video web con perspectiva, chroma key y exportación WebM. Módulo de GeneradorStudio.">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <style>
        /* ═══════════════════════════════════════════════════════
           ESTILOS GLOBALES 
        ═══════════════════════════════════════════════════════ */
        :root {
            --bg:          #0f172a;
            --panel:       #1e293b;
            --border:      #334155;
            --accent:      #6366f1;
            --accent2:     #22d3ee;
            --danger:      #ef4444;
            --text:        #f8fafc;
            --text-muted:  #94a3b8;
            --pin-color:   #ff3e3e;
            --radius-ui:   12px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 24px 16px 48px;
            user-select: none;
        }

        .header { width: 100%; max-width: 900px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, #818cf8, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; transition: color .2s; }
        .header a:hover { color: var(--text); }

        #drop-zone { width: 100%; max-width: 640px; aspect-ratio: 16 / 9; border: 2px dashed var(--border); border-radius: var(--radius-ui); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: border-color .3s, background .3s; color: var(--text-muted); background: rgba(99,102,241,.04); margin-bottom: 20px; }
        #drop-zone:hover { border-color: var(--accent); background: rgba(99,102,241,.1); }
        #drop-zone .icon { font-size: 3rem; }
        #drop-zone p { font-size: 0.9rem; }

        #editor-wrapper { display: none; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
        #editor-container { position: relative; background: #000; border: 2px solid var(--border); border-radius: 8px; overflow: visible; box-shadow: 0 20px 40px rgba(0,0,0,.6); }
        #editor-container canvas { display: block; border-radius: 6px; }

        .corner-pin { position: absolute; width: 20px; height: 20px; background: var(--pin-color); border: 3px solid #fff; border-radius: 50%; cursor: move; transform: translate(-50%, -50%); z-index: 10; box-shadow: 0 0 0 3px rgba(255,62,62,.35), 0 0 12px rgba(255,62,62,.6); transition: transform .15s, box-shadow .15s; }
        .corner-pin:hover, .corner-pin.dragging { transform: translate(-50%, -50%) scale(1.35); box-shadow: 0 0 0 5px rgba(255,62,62,.5), 0 0 20px rgba(255,62,62,.8); }
        #pin-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: visible; }
        #pin-overlay polyline { fill: none; stroke: rgba(255,255,255,.25); stroke-width: 1.5; stroke-dasharray: 6 4; }

        .controls-panel { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; width: 100%; max-width: 760px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-ui); padding: 14px 18px; }
        .ctrl-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
        .ctrl-group label { font-size: 0.7rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-muted); }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        input[type="color"] { border: none; background: none; width: 36px; height: 28px; cursor: pointer; border-radius: 4px; }
        
        .chroma-row { display: flex; align-items: center; gap: 8px; }
        .ctrl-sep { width: 1px; height: 48px; background: var(--border); align-self: center; }
        
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { display: flex; align-items: center; gap: 6px; padding: 10px 22px; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: transform .15s, box-shadow .15s, background .2s; }
        .btn:active { transform: scale(.97); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #818cf8); color: #fff; box-shadow: 0 4px 14px rgba(99,102,241,.4); }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,.6); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #f97316); color: #fff; box-shadow: 0 4px 14px rgba(239,68,68,.4); }
        .btn-danger:hover { box-shadow: 0 6px 20px rgba(239,68,68,.6); }
        .btn-ghost { background: var(--panel); color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
        
        #status-bar { font-size: 0.78rem; color: var(--text-muted); text-align: center; min-height: 1.2em; letter-spacing: .03em; }
        #status-bar.recording { color: #f97316; }
        #status-bar.ok { color: #4ade80; }
        #video-uploader { display: none; }
    </style>
</head>
<body>

    <header class="header">
        <h1>🎬 Editor de Video</h1>
        <a href="index.html">← Volver al Hub</a>
    </header>

    <div id="drop-zone" role="button" aria-label="Área para cargar video">
        <span class="icon">🎥</span>
        <strong>Haz clic o arrastra un video aquí</strong>
        <p>Soporta MP4, WebM, MOV • Horizontal y Vertical</p>
    </div>

    <div id="editor-wrapper">
        <div id="editor-container">
            <svg id="pin-overlay" xmlns="http://www.w3.org/2000/svg">
                <polyline id="pin-outline" points="" />
            </svg>
            <div class="corner-pin" id="pin-tl" data-index="0" title="Esquina superior-izquierda"></div>
            <div class="corner-pin" id="pin-tr" data-index="1" title="Esquina superior-derecha"></div>
            <div class="corner-pin" id="pin-br" data-index="2" title="Esquina inferior-derecha"></div>
            <div class="corner-pin" id="pin-bl" data-index="3" title="Esquina inferior-izquierda"></div>
        </div>

        <div class="controls-panel">
            <div class="ctrl-group">
                <label>Color Chroma</label>
                <div class="chroma-row">
                    <input type="color" id="chroma-color" value="#00ff00" title="Color a eliminar">
                    <span id="chroma-hex" style="font-size:.75rem;color:var(--text-muted)">#00ff00</span>
                </div>
            </div>

            <div class="ctrl-group">
                <label>Tolerancia <span id="val-tol">0.35</span></label>
                <input type="range" id="chroma-tol" min="0" max="1" step="0.01" value="0.35">
            </div>

            <div class="ctrl-group">
                <label>Suavizado <span id="val-smooth">0.08</span></label>
                <input type="range" id="chroma-smooth" min="0" max="0.5" step="0.01" value="0.08">
            </div>

            <div class="ctrl-sep"></div>

            <div class="ctrl-group">
                <label>Radio de esquinas <span id="val-radius">0.04</span></label>
                <input type="range" id="corner-radius" min="0" max="0.25" step="0.005" value="0.04">
            </div>

            <div class="ctrl-sep"></div>

            <div class="ctrl-group">
                <label>Color de fondo</label>
                <div class="chroma-row">
                    <input type="color" id="bg-color" value="#000000" title="Color que reemplaza las zonas del chroma key">
                    <span id="bg-hex" style="font-size:.75rem;color:var(--text-muted)">#000000</span>
                </div>
            </div>

            <div class="ctrl-sep"></div>

            <div class="action-buttons">
                <button class="btn btn-ghost" id="btn-reset-pins" title="Restablecer pines a las esquinas">↺ Resetear</button>
                <button class="btn btn-primary" id="btn-load" title="Cargar otro video">📂 Cargar</button>
                <button class="btn btn-danger" id="btn-export" title="Grabar y descargar">⏺ Exportar</button>
            </div>
        </div>

        <div class="controls-panel" style="margin-top: -8px;">
            <div class="ctrl-group" style="min-width: 130px;">
                <label>Modo Perspectiva</label>
                <select id="control-mode" style="background:#242f42; color:#fff; border:1px solid var(--border); padding:6px 8px; border-radius:6px; font-size:0.8rem; cursor:pointer; font-family:inherit;">
                    <option value="3d" selected>Asistido 3D (Cámara Real)</option>
                    <option value="manual">Manual 2D (Homografía)</option>
                </select>
            </div>

            <div class="ctrl-sep"></div>

            <div id="controls-3d-group" style="display: flex; gap: 16px; flex-wrap: wrap; flex: 1; align-items: center;">
                <div class="ctrl-group" style="flex: 1; min-width: 100px;">
                    <label>Giro (Yaw) <span id="val-yaw" style="color:var(--accent2); font-weight:bold;">0°</span></label>
                    <input type="range" id="param-yaw" min="-60" max="60" step="1" value="0">
                </div>

                <div class="ctrl-group" style="flex: 1; min-width: 100px;">
                    <label>Inclinación (Pitch) <span id="val-pitch" style="color:var(--accent2); font-weight:bold;">0°</span></label>
                    <input type="range" id="param-pitch" min="-60" max="60" step="1" value="0">
                </div>

                <div class="ctrl-group" style="flex: 1; min-width: 100px;">
                    <label>Zoom <span id="val-zoom" style="color:var(--accent2); font-weight:bold;">1.00</span></label>
                    <input type="range" id="param-zoom" min="0.5" max="1.5" step="0.02" value="1.00">
                </div>

                <div class="ctrl-group" style="flex: 1; min-width: 100px;">
                    <label>Profundidad Z <span id="val-depth" style="color:var(--accent2); font-weight:bold;">1.00</span></label>
                    <input type="range" id="param-depth" min="0.5" max="2.0" step="0.05" value="1.00">
                </div>
            </div>
        </div>

        <div id="status-bar">Listo.</div>
    </div>
    <input type="file" id="video-uploader" accept="video/*">

    <script type="module">
    import * as THREE from 'three';

    /* ──────────────────────────────────────────────────────────────────
       REFERENCIAS DOM
    ────────────────────────────────────────────────────────────────── */
    const dropZone      = document.getElementById('drop-zone');
    const editorWrapper = document.getElementById('editor-wrapper');
    const container     = document.getElementById('editor-container');
    const videoUploader = document.getElementById('video-uploader');
    const statusBar     = document.getElementById('status-bar');

    const pinEls = [
        document.getElementById('pin-tl'),
        document.getElementById('pin-tr'),
        document.getElementById('pin-br'),
        document.getElementById('pin-bl'),
    ];
    const pinOutlineSVG = document.getElementById('pin-outline');

    const chromaColorInput  = document.getElementById('chroma-color');
    const chromaHexLabel    = document.getElementById('chroma-hex');
    const chromaTolInput    = document.getElementById('chroma-tol');
    const chromaSmoothInput = document.getElementById('chroma-smooth');
    const cornerRadiusInput = document.getElementById('corner-radius');

    const valTol    = document.getElementById('val-tol');
    const valSmooth = document.getElementById('val-smooth');
    const valRadius = document.getElementById('val-radius');

    const controlModeSelect = document.getElementById('control-mode');
    const controls3dGroup   = document.getElementById('controls-3d-group');
    const paramYaw          = document.getElementById('param-yaw');
    const paramPitch        = document.getElementById('param-pitch');
    const paramZoom         = document.getElementById('param-zoom');
    const paramDepth        = document.getElementById('param-depth');
    
    const valYaw            = document.getElementById('val-yaw');
    const valPitch          = document.getElementById('val-pitch');
    const valZoom           = document.getElementById('val-zoom');
    const valDepth          = document.getElementById('val-depth');

    /* ──────────────────────────────────────────────────────────────────
       ESTADO GLOBAL
    ────────────────────────────────────────────────────────────────── */
    let cW = 0, cH = 0;
    let pinCoords = [ {x:0,y:0}, {x:640,y:0}, {x:640,y:360}, {x:0,y:360} ];
    let videoEl = null;
    let animFrameId = null;
    let currentVideoFile = null;
    
    let renderer, scene, camera, videoTexture, shaderMaterial, planeMesh;
    let baseZDistance = 0; // Distancia base de la cámara para llenar el canvas

    let yaw = 0, pitch = 0, zoom = 1.0, perspective = 1.0;
    let is3DMode = true; 

    /* ══════════════════════════════════════════════════════════════════
       SHADERS GLSL (Con Aspect Ratio Corregido)
    ══════════════════════════════════════════════════════════════════ */
    const VERTEX_SHADER = `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;

    const FRAGMENT_SHADER = `
        uniform sampler2D uVideoTexture;
        uniform vec3      uChromaColor;
        uniform float     uTolerance;
        uniform float     uSoftness;
        uniform float     uCornerRadius;
        uniform vec3      uBgColor;
        uniform mat3      uHomography;
        uniform float     uAspect;      // NUEVO: Relación de aspecto para corregir deformación de esquinas
        uniform float     uIs3DMode;    // NUEVO: 1.0 = 3D Nativo, 0.0 = Homografía 2D
        varying vec2      vUv;

        float chromaKeyFactor(vec3 pixel, vec3 key, float tol, float softness) {
            return smoothstep(tol - softness, tol + softness, distance(pixel, key));
        }

        // Función corregida para calcular esquinas perfectas respetando el formato del video
        float roundedCornerMask(vec2 uv, float radius) {
            // Transformamos UV a un espacio donde X se escala por el Aspect Ratio
            vec2 aspectUV = vec2(uv.x * uAspect, uv.y);
            // El centro ahora respeta este escalado
            vec2 center = vec2(0.5 * uAspect, 0.5);
            
            vec2 centered = abs(aspectUV - center);
            vec2 corner = max(centered - (center - radius), 0.0);
            return smoothstep(radius, radius - 0.002, length(corner));
        }

        void main() {
            vec2 finalUV = vUv;

            // Solo aplicar Homografía si estamos en modo manual
            if (uIs3DMode < 0.5) {
                vec3 uvH = uHomography * vec3(vUv, 1.0);
                finalUV  = uvH.xy / uvH.z;
            }

            // Descartar píxeles fuera de la textura
            if (finalUV.x < 0.0 || finalUV.x > 1.0 || finalUV.y < 0.0 || finalUV.y > 1.0) {
                gl_FragColor = vec4(uBgColor, 1.0);
                return;
            }

            vec4 videoColor = texture2D(uVideoTexture, finalUV);
            float chromaFactor = chromaKeyFactor(videoColor.rgb, uChromaColor, uTolerance, uSoftness);
            
            // Aplicar máscara de esquinas usando el UV final corregido
            float cornerMask = roundedCornerMask(finalUV, uCornerRadius);

            float videoFactor = chromaFactor * cornerMask;
            vec3  finalColor  = mix(uBgColor, videoColor.rgb, videoFactor);
            gl_FragColor = vec4(finalColor, 1.0);
        }
    `;

    /* ══════════════════════════════════════════════════════════════════
       INICIALIZACIÓN THREE.JS (Con PerspectiveCamera)
    ══════════════════════════════════════════════════════════════════ */
    function initThreeJS() {
        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(cW, cH);
        renderer.setClearColor(0x000000, 1);
        container.appendChild(renderer.domElement);

        scene = new THREE.Scene();

        // 1. CAMBIO CRÍTICO: Usamos Cámara de Perspectiva Real (FOV 45 grados)
        const fov = 45;
        camera = new THREE.PerspectiveCamera(fov, cW / cH, 0.1, 3000);
        
        // Calculamos la distancia Z exacta para que un plano de altura cH llene perfectamente la pantalla
        baseZDistance = (cH / 2) / Math.tan(THREE.MathUtils.degToRad(fov / 2));
        camera.position.z = baseZDistance;

        videoTexture = new THREE.VideoTexture(videoEl);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;
        videoTexture.format    = THREE.RGBAFormat;

        shaderMaterial = new THREE.ShaderMaterial({
            vertexShader:   VERTEX_SHADER,
            fragmentShader: FRAGMENT_SHADER,
            uniforms: {
                uVideoTexture: { value: videoTexture },
                uChromaColor:  { value: hexToVec3(chromaColorInput.value) },
                uTolerance:    { value: parseFloat(chromaTolInput.value) },
                uSoftness:     { value: parseFloat(chromaSmoothInput.value) },
                uCornerRadius: { value: parseFloat(cornerRadiusInput.value) },
                uBgColor:      { value: hexToVec3(document.getElementById('bg-color').value) },
                uHomography:   { value: new THREE.Matrix3() },
                uAspect:       { value: cW / cH }, // Pasamos el Aspect Ratio al shader
                uIs3DMode:     { value: is3DMode ? 1.0 : 0.0 }
            },
            transparent: false,
            side: THREE.DoubleSide,
        });

        planeMesh = new THREE.Mesh(new THREE.PlaneGeometry(cW, cH), shaderMaterial);
        scene.add(planeMesh);

        if (is3DMode) update3DPerspective();
        else updateHomography();
        
        setStatus('Video cargado. Selecciona tu modo de perspectiva arriba.', 'ok');
    }

    /* ══════════════════════════════════════════════════════════════════
       MODO MANUAL: HOMOGRAFÍA DLT (Para deformación libre en 2D)
    ══════════════════════════════════════════════════════════════════ */
    function computeHomographyDLT(srcPts, dstPts) {
        const rows = [];
        for (let i = 0; i < 4; i++) {
            const [x, y] = srcPts[i], [u, v] = dstPts[i];
            rows.push([-x,-y,-1, 0, 0, 0, x*u, y*u, u]);
            rows.push([ 0, 0, 0,-x,-y,-1, x*v, y*v, v]);
        }
        const n = 8;
        const aug = rows.map(r => [...r.slice(0,n), -r[n]]);
        for (let col = 0; col < n; col++) {
            let mx = col;
            for (let r = col+1; r < n; r++) if (Math.abs(aug[r][col]) > Math.abs(aug[mx][col])) mx = r;
            [aug[col], aug[mx]] = [aug[mx], aug[col]];
            if (Math.abs(aug[col][col]) < 1e-12) continue;
            for (let r = 0; r < n; r++) {
                if (r === col) continue;
                const f = aug[r][col] / aug[col][col];
                for (let c = col; c <= n; c++) aug[r][c] -= f * aug[col][c];
            }
        }
        const h = aug.map((row, i) => row[n] / row[i]);
        return [...h, 1.0];
    }

    function updateHomography() {
        if (!shaderMaterial || !planeMesh) return;
        
        // En modo manual, el plano 3D vuelve a estar plano frente a la cámara
        planeMesh.rotation.set(0, 0, 0);
        planeMesh.position.set(0, 0, 0);
        planeMesh.scale.set(1, 1, 1);
        shaderMaterial.uniforms.uIs3DMode.value = 0.0; // Activa la homografía en el shader

        const canvasUV = pinCoords.map(p => [p.x / cW, 1 - p.y / cH]);
        const videoUV  = [[0,1],[1,1],[1,0],[0,0]];
        const H = computeHomographyDLT(canvasUV, videoUV);
        
        shaderMaterial.uniforms.uHomography.value.set(
            H[0], H[1], H[2],
            H[3], H[4], H[5],
            H[6], H[7], H[8]
        );
        updatePinOverlay();
    }

    /* ══════════════════════════════════════════════════════════════════
       MODO ASISTIDO: PERSPECTIVA 3D NATIVA (Evita Skew y Deformación)
    ══════════════════════════════════════════════════════════════════ */
    function update3DPerspective() {
        if (!planeMesh || !camera) return;

        // 1. Aplicamos rotaciones reales en el espacio 3D
        planeMesh.rotation.y = THREE.MathUtils.degToRad(yaw);
        planeMesh.rotation.x = THREE.MathUtils.degToRad(pitch);
        
        // 2. Aplicamos profundidad (Z) y Zoom
        const depthMultiplier = perspective;
        camera.position.z = baseZDistance * depthMultiplier;
        
        // Compensamos la escala visual para que el zoom funcione igual a cualquier profundidad
        planeMesh.scale.set(zoom * depthMultiplier, zoom * depthMultiplier, 1);
        
        // Actualizamos las matrices internas para poder proyectar las esquinas a la pantalla
        planeMesh.updateMatrixWorld();
        
        // 3. Apagamos la homografía del shader (Dejamos que Three.js haga el trabajo 3D)
        shaderMaterial.uniforms.uIs3DMode.value = 1.0;

        // 4. Proyectamos las 4 esquinas del Mesh 3D hacia el Canvas 2D para actualizar los pines rojos
        const hw = cW / 2;
        const hh = cH / 2;
        const corners3D = [
            new THREE.Vector3(-hw,  hh, 0), // TL
            new THREE.Vector3( hw,  hh, 0), // TR
            new THREE.Vector3( hw, -hh, 0), // BR
            new THREE.Vector3(-hw, -hh, 0)  // BL
        ];

        corners3D.forEach((pt, i) => {
            pt.applyMatrix4(planeMesh.matrixWorld); // Mueve el punto a su rotación/posición global
            pt.project(camera);                     // Proyecta según la cámara de perspectiva
            
            // Convierte coordenadas normalizadas (-1 a 1) a píxeles del Canvas
            pinCoords[i] = {
                x: (pt.x * 0.5 + 0.5) * cW,
                y: (-(pt.y * 0.5) + 0.5) * cH
            };
            applyPinPosition(pinEls[i], pinCoords[i]);
        });

        updatePinOverlay();
    }

    /* ══════════════════════════════════════════════════════════════════
       CONTROLES Y DRAG & DROP
    ══════════════════════════════════════════════════════════════════ */
    function reset3DControls() {
        yaw = 0; pitch = 0; zoom = 1.0; perspective = 1.0;
        paramYaw.value = 0; paramPitch.value = 0; paramZoom.value = 1.0; paramDepth.value = 1.0;
        valYaw.textContent = '0°'; valPitch.textContent = '0°'; valZoom.textContent = '1.00'; valDepth.textContent = '1.00';
    }

    function resetPins() {
        if (is3DMode) {
            reset3DControls();
            update3DPerspective();
        } else {
            pinCoords[0] = { x: 0,  y: 0  };
            pinCoords[1] = { x: cW, y: 0  };
            pinCoords[2] = { x: cW, y: cH };
            pinCoords[3] = { x: 0,  y: cH };
            pinEls.forEach((el, i) => applyPinPosition(el, pinCoords[i]));
            if (planeMesh) updateHomography();
        }
    }

    function applyPinPosition(el, coord) {
        el.style.left = coord.x + 'px';
        el.style.top  = coord.y + 'px';
    }

    function updatePinOverlay() {
        const pts = [pinCoords[0], pinCoords[1], pinCoords[2], pinCoords[3], pinCoords[0]]
            .map(p => `${p.x},${p.y}`).join(' ');
        pinOutlineSVG.setAttribute('points', pts);
    }

    let activePin = null, activePinEl = null;

    pinEls.forEach((el, index) => {
        el.addEventListener('mousedown', (e) => { e.preventDefault(); activePin = index; activePinEl = el; el.classList.add('dragging'); });
        el.addEventListener('touchstart', (e) => { e.preventDefault(); activePin = index; activePinEl = el; el.classList.add('dragging'); }, { passive: false });
    });

    function movePinTo(clientX, clientY) {
        const rect = container.getBoundingClientRect();
        let x = Math.max(-100, Math.min(cW + 100, clientX - rect.left));
        let y = Math.max(-100, Math.min(cH + 100, clientY - rect.top));

        // Si el usuario arrastra un pin, cambiamos a modo Manual obligatoriamente
        if (is3DMode) {
            is3DMode = false;
            controlModeSelect.value = 'manual';
            controls3dGroup.style.display = 'none';
        }

        pinCoords[activePin] = { x, y };
        applyPinPosition(activePinEl, { x, y });
        if (planeMesh) updateHomography();
    }

    document.addEventListener('mousemove', (e) => { if (activePin !== null) movePinTo(e.clientX, e.clientY); });
    document.addEventListener('touchmove', (e) => { if (activePin !== null) { e.preventDefault(); movePinTo(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    
    function stopDrag() {
        if (activePinEl) activePinEl.classList.remove('dragging');
        activePin = null; activePinEl = null;
    }
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchend', stopDrag);

    /* ══════════════════════════════════════════════════════════════════
       EVENTOS UI
    ══════════════════════════════════════════════════════════════════ */
    controlModeSelect.addEventListener('change', (e) => {
        is3DMode = (e.target.value === '3d');
        if (is3DMode) {
            controls3dGroup.style.display = 'flex';
            reset3DControls();
            update3DPerspective();
        } else {
            controls3dGroup.style.display = 'none';
            // Al pasar a manual, usamos las posiciones actuales de los pines para mantener la forma
            updateHomography(); 
        }
    });

    paramYaw.addEventListener('input', () => { yaw = parseInt(paramYaw.value); valYaw.textContent = yaw + '°'; if (is3DMode) update3DPerspective(); });
    paramPitch.addEventListener('input', () => { pitch = parseInt(paramPitch.value); valPitch.textContent = pitch + '°'; if (is3DMode) update3DPerspective(); });
    paramZoom.addEventListener('input', () => { zoom = parseFloat(paramZoom.value); valZoom.textContent = zoom.toFixed(2); if (is3DMode) update3DPerspective(); });
    paramDepth.addEventListener('input', () => { perspective = parseFloat(paramDepth.value); valDepth.textContent = perspective.toFixed(2); if (is3DMode) update3DPerspective(); });

    chromaTolInput.addEventListener('input', () => { valTol.textContent = parseFloat(chromaTolInput.value).toFixed(2); });
    chromaSmoothInput.addEventListener('input', () => { valSmooth.textContent = parseFloat(chromaSmoothInput.value).toFixed(2); });
    cornerRadiusInput.addEventListener('input', () => { valRadius.textContent = parseFloat(cornerRadiusInput.value).toFixed(3); });
    chromaColorInput.addEventListener('input', () => { chromaHexLabel.textContent = chromaColorInput.value; });
    document.getElementById('bg-color').addEventListener('input', (e) => { document.getElementById('bg-hex').textContent = e.target.value; });
    document.getElementById('btn-reset-pins').addEventListener('click', resetPins);
    document.getElementById('btn-load').addEventListener('click', () => videoUploader.click());

    /* ══════════════════════════════════════════════════════════════════
       LOOP DE ANIMACIÓN Y CARGA
    ══════════════════════════════════════════════════════════════════ */
    /* ══════════════════════════════════════════════════════════════════
       SECCIÓN 5 – LOOP DE ANIMACIÓN
    ══════════════════════════════════════════════════════════════════ */
    function animate() {
        animFrameId = requestAnimationFrame(animate);
        
        if(shaderMaterial) {
            // Obtenemos el valor actual del color de fondo seleccionado en la UI
            const bgColorHex = document.getElementById('bg-color').value;

            shaderMaterial.uniforms.uChromaColor.value  = hexToVec3(chromaColorInput.value);
            shaderMaterial.uniforms.uTolerance.value     = parseFloat(chromaTolInput.value);
            shaderMaterial.uniforms.uSoftness.value      = parseFloat(chromaSmoothInput.value);
            shaderMaterial.uniforms.uCornerRadius.value  = parseFloat(cornerRadiusInput.value);
            shaderMaterial.uniforms.uBgColor.value       = hexToVec3(bgColorHex);

            // CORRECCIÓN: Sincronizamos el fondo completo de WebGL con el color seleccionado
            renderer.setClearColor(bgColorHex, 1);
        }
        
        renderer.render(scene, camera);
    }

    function loadVideo(file) {
        cleanupScene();
        setStatus('⏳ Cargando video...', '');
        currentVideoFile = file;
        
        videoEl = document.createElement('video');
        videoEl.loop = false; videoEl.muted = true; videoEl.playsInline = true; videoEl.style.display = 'none';
        document.body.appendChild(videoEl);

        videoEl.addEventListener('loadedmetadata', () => {
            const vW = videoEl.videoWidth, vH = videoEl.videoHeight;
            if (!vW || !vH) return setStatus('❌ Codec no soportado. Usa H.264 MP4.', '');

            const ratio = vW / vH;
            const MAX = 640;

            if (ratio >= 1) { cW = MAX; cH = Math.round(MAX / ratio); }
            else { cH = MAX; cW = Math.round(MAX * ratio); }

            cW -= (cW % 2); cH -= (cH % 2); // Forzar dimensiones pares (requerido por WebCodecs)

            container.style.width = cW + 'px'; container.style.height = cH + 'px';
            dropZone.style.display = 'none'; editorWrapper.style.display = 'flex';

            initThreeJS();

            if (!isFinite(videoEl.duration)) {
                setStatus('⏳ Detectando duración del video...', '');
                const onDurationChange = () => {
                    if (isFinite(videoEl.duration)) {
                        videoEl.removeEventListener('durationchange', onDurationChange);
                        videoEl.currentTime = 0;
                        videoEl.play().then(() => animate()).catch(console.warn);
                        setStatus(`✅ Duración: ${videoEl.duration.toFixed(2)}s.`, 'ok');
                    }
                };
                videoEl.addEventListener('durationchange', onDurationChange);
                videoEl.currentTime = 99999;
            } else {
                videoEl.play().then(() => animate()).catch(console.warn);
            }
        });

        videoEl.src = URL.createObjectURL(file);
    }

    function cleanupScene() {
        if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
        if (renderer) { renderer.dispose(); renderer.domElement.remove(); renderer = null; }
        if (videoTexture) { videoTexture.dispose(); videoTexture = null; }
        if (shaderMaterial) { shaderMaterial.dispose(); shaderMaterial = null; }
        if (planeMesh) { planeMesh.geometry.dispose(); planeMesh = null; }
        if (videoEl) { videoEl.pause(); videoEl.remove(); videoEl = null; }
    }

    dropZone.addEventListener('click', () => videoUploader.click());
    videoUploader.addEventListener('change', (e) => { if (e.target.files[0]) loadVideo(e.target.files[0]); e.target.value = ''; });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); e.stopPropagation(); dropZone.style.borderColor = '';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('video/')) loadVideo(file);
    });

    function hexToVec3(hex) {
        return new THREE.Vector3(
            parseInt(hex.slice(1, 3), 16) / 255,
            parseInt(hex.slice(3, 5), 16) / 255,
            parseInt(hex.slice(5, 7), 16) / 255
        );
    }
    function setStatus(msg, type) { statusBar.textContent = msg; statusBar.className = type || ''; }

   /* ══════════════════════════════════════════════════════════════════
       SECCIÓN 6 – MOTOR DE EXPORTACIÓN (WebCodecs + webm-muxer)
    ══════════════════════════════════════════════════════════════════ */

    document.getElementById('btn-export').addEventListener('click', startExport);

    async function startExport() {
        if (!renderer || !videoEl) {
            alert('Primero carga un video.');
            return;
        }

        if (!window.VideoEncoder) {
            alert('Tu navegador no soporta exportación rápida. Usa Chrome 94+ o Edge 94+.');
            return;
        }

        const btnExport = document.getElementById('btn-export');
        btnExport.disabled = true;
        btnExport.textContent = '⚡ Exportando...';

        if (animFrameId) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
        }

        const originalPixelRatio = renderer.getPixelRatio();
        renderer.setPixelRatio(1);
        renderer.setSize(cW, cH);

        const W = cW;
        const H = cH;
        const FPS = 60;
        const totalSec = videoEl.duration;

        if (!isFinite(totalSec) || totalSec <= 0) {
            alert('No se puede exportar: la duración del video es inválida.');
            btnExport.disabled = false;
            btnExport.textContent = '⏺ Exportar';
            renderer.setPixelRatio(originalPixelRatio);
            renderer.setSize(cW, cH);
            videoEl.play().then(() => animate()).catch(e => console.warn(e));
            return;
        }

        const totalFrames = Math.ceil(totalSec * FPS);
        const FRAME_US = Math.round(1_000_000 / FPS);

        try {
            setStatus('⏳ Decodificando pista de audio original...', 'recording');
            await new Promise(r => setTimeout(r, 0));

            let audioBuffer = null;
            let AUDIO_SR = 48000;
            let AUDIO_CH = 2;

            if (currentVideoFile && window.AudioEncoder) {
                try {
                    const fileBuffer = await currentVideoFile.arrayBuffer();
                    const tmpCtx = new AudioContext();
                    audioBuffer = await tmpCtx.decodeAudioData(fileBuffer);
                    await tmpCtx.close();
                    AUDIO_SR = Math.min(audioBuffer.sampleRate, 48000);
                    AUDIO_CH = Math.min(audioBuffer.numberOfChannels, 2);
                } catch (audioErr) {
                    console.warn('Sin pista de audio o no se pudo decodificar:', audioErr);
                    audioBuffer = null;
                }
            }

            setStatus('📦 Cargando muxer WebM...', 'recording');

            const { Muxer, ArrayBufferTarget } = await import('https://cdn.jsdelivr.net/npm/webm-muxer@3/+esm');

            const muxerConfig = {
                target: new ArrayBufferTarget(),
                video: { codec: 'V_VP9', width: W, height: H, frameRate: FPS },
                firstTimestampBehavior: 'offset',
            };
            
            if (audioBuffer) {
                muxerConfig.audio = { codec: 'A_OPUS', sampleRate: AUDIO_SR, numberOfChannels: AUDIO_CH };
            }
            const muxer = new Muxer(muxerConfig);

            const encoder = new VideoEncoder({
                output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                error: (e) => { throw e; },
            });

            encoder.configure({
                codec: 'vp09.00.10.08',
                width: W,
                height: H,
                bitrate: 15_000_000,
                framerate: FPS,
            });

            let audioEnc = null;
            if (audioBuffer) {
                audioEnc = new AudioEncoder({
                    output: (chunk, meta) => muxer.addAudioChunk(chunk, meta),
                    error: (e) => { throw e; }
                });
                audioEnc.configure({
                    codec: 'opus',
                    sampleRate: AUDIO_SR,
                    numberOfChannels: AUDIO_CH,
                    bitrate: 192_000
                });
            }

            videoEl.pause();
            videoEl.currentTime = 0;

            for (let i = 0; i < totalFrames; i++) {
                const targetTimeSec = i / FPS;

                if (Math.abs(videoEl.currentTime - targetTimeSec) > (0.5 / FPS)) {
                    videoEl.currentTime = targetTimeSec;
                    await new Promise(resolve => {
                        const onSeeked = () => {
                            videoEl.removeEventListener('seeked', onSeeked);
                            resolve();
                        };
                        videoEl.addEventListener('seeked', onSeeked);
                        setTimeout(resolve, 500);
                    });
                }

                if (videoTexture) videoTexture.needsUpdate = true;
                renderer.render(scene, camera);

                const frame = new VideoFrame(renderer.domElement, { timestamp: i * FRAME_US });
                encoder.encode(frame, { keyFrame: i % (FPS * 2) === 0 });
                frame.close();

                if (i % 30 === 0) {
                    const pct = Math.round((i / totalFrames) * 100);
                    setStatus(`⚡ Exportando video: ${pct}% (frame ${i}/${totalFrames})`, 'recording');
                    await new Promise(r => setTimeout(r, 0));
                }
            }

            if (audioEnc && audioBuffer) {
                setStatus('🎵 Exportando pista de audio...', 'recording');
                await new Promise(r => setTimeout(r, 0));

                const CHUNK_FRAMES = 1024;
                const totalAudioFrames = Math.ceil(totalSec * AUDIO_SR);
                const audioDurationFrames = audioBuffer.length;
                const channelData = [];
                
                for (let c = 0; c < AUDIO_CH; c++) {
                    channelData.push(audioBuffer.getChannelData(c));
                }

                for (let offset = 0; offset < totalAudioFrames; offset += CHUNK_FRAMES) {
                    const chunkFrames = Math.min(CHUNK_FRAMES, totalAudioFrames - offset);
                    const timestampUs = Math.round(offset / AUDIO_SR * 1_000_000);
                    const planar = new Float32Array(chunkFrames * AUDIO_CH);
                    
                    for (let c = 0; c < AUDIO_CH; c++) {
                        for (let s = 0; s < chunkFrames; s++) {
                            const srcIdx = (offset + s) % audioDurationFrames;
                            planar[c * chunkFrames + s] = channelData[c][srcIdx];
                        }
                    }

                    const audioData = new AudioData({
                        format: 'f32-planar',
                        sampleRate: AUDIO_SR,
                        numberOfFrames: chunkFrames,
                        numberOfChannels: AUDIO_CH,
                        timestamp: timestampUs,
                        data: planar
                    });
                    audioEnc.encode(audioData);
                    audioData.close();
                }
                await audioEnc.flush();
            }

            setStatus('⚡ Finalizando archivo...', 'recording');
            await encoder.flush();
            muxer.finalize();

            const blob = new Blob([muxer.target.buffer], { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `video-editado-${Date.now()}.webm`;
            a.click();
            URL.revokeObjectURL(url);

            setStatus('✅ Video exportado y descargado correctamente.', 'ok');

        } catch (err) {
            console.error('Error en exportación:', err);
            setStatus(`❌ Error al exportar: ${err.message}`, '');
            alert('Error al exportar:\n' + err.message);
        } finally {
            btnExport.disabled = false;
            btnExport.textContent = '⏺ Exportar';

            if (renderer) {
                renderer.setPixelRatio(originalPixelRatio);
                renderer.setSize(cW, cH);
            }

            videoEl.currentTime = 0;
            videoEl.play().then(() => animate()).catch(e => console.warn(e));
        }
    }

    </script>
</body>
</html>
