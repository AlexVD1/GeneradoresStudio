<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar Studio V4</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to right, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
            max-width: 1400px;
            width: 100%;
        }

        .controls {
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .preview-area {
            background: var(--panel);
            padding: 30px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        .control-group {
            margin-bottom: 15px;
        }

        .label-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }

        .pixel-value {
            font-size: 0.75rem;
            font-family: monospace;
            background: #0f172a;
            padding: 2px 6px;
            border-radius: 4px;
            color: #22d3ee;
        }

        input[type="range"],
        input[type="color"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        #previewBtn {
            background: #334155;
            color: white;
            border: 1px solid #475569;
        }

        #renderBtn {
            background: var(--primary);
            color: white;
        }

        #renderBtn:disabled {
            background: #475569;
            opacity: 0.6;
        }

        .recording-status {
            color: #fb7185;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            text-align: center;
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .back-nav {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: #334155;
            color: #f8fafc;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #475569;
        }

        .back-btn:hover {
            background: #475569;
            transform: translateX(-3px);
        }
    </style>
</head>

<body>
    <div class="back-nav"><a href="index.html" class="back-btn">← Volver al Menú Principal</a></div>

    <h1>Progress Bar Studio V4</h1>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Orientación</label>
                <select id="orientation">
                    <option value="horizontal">Horizontal</option>
                    <option value="vertical">Vertical</option>
                </select>
            </div>

            <div class="control-group">
                <label>Mostrar Contador</label>
                <select id="showCounter">
                    <option value="true">Sí (Segundos)</option>
                    <option value="false">No (Ocultar)</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid #475569; margin: 20px 0;">

            <div class="control-group">
                <label>Modo</label>
                <select id="mode">
                    <option value="countup">Count Up</option>
                    <option value="countdown">Count Down</option>
                </select>
            </div>

            <div class="control-group">
                <label>Duración (seg)</label>
                <input type="number" id="duration" value="5" min="1">
            </div>

            <div class="control-group">
                <div class="label-header">
                    <label>Largo de Barra</label>
                    <span id="barLengthVal" class="pixel-value">600px</span>
                </div>
                <input type="range" id="barLength" min="100" max="1000" value="600">
            </div>

            <div class="control-group">
                <div class="label-header">
                    <label>Grosor</label>
                    <span id="barThicknessVal" class="pixel-value">40px</span>
                </div>
                <input type="range" id="barThickness" min="5" max="300" value="40">
            </div>

            <div class="control-group">
                <label>Color</label>
                <input type="color" id="barColor" value="#6366f1">
            </div>

            <div class="control-group">
                <label>Fondo</label>
                <select id="bgColor">
                    <option value="#000000">Negro</option>
                    <option value="#00ff00">Chroma Verde</option>
                    <option value="#0000ff">Chroma Azul</option>
                </select>
            </div>

            <div class="control-group">
                <label>Esquinas</label>
                <input type="range" id="borderRadius" min="0" max="150" value="10">
            </div>

            <div class="control-group">
                <label>Brillo (Glow)</label>
                <input type="range" id="glow" min="0" max="60" value="25">
            </div>

            <hr style="border: 0; border-top: 1px solid #475569; margin: 20px 0;">

            <div class="control-group">
                <label>Color de Borde</label>
                <input type="color" id="borderColor" value="#ffffff">
            </div>

            <div class="control-group">
                <div class="label-header">
                    <label>Grosor de Borde</label>
                    <span id="borderWidthVal" class="pixel-value">2px</span>
                </div>
                <input type="range" id="borderWidth" min="0" max="20" value="2">
            </div>

            <button id="previewBtn">Previsualizar</button>
            <button id="renderBtn">Exportar Video</button>
            <div id="status" class="recording-status">● GRABANDO...</div>
        </div>

        <div class="preview-area">
            <canvas id="canvas" width="1280" height="720"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const renderBtn = document.getElementById('renderBtn');
        const previewBtn = document.getElementById('previewBtn');
        const status = document.getElementById('status');

        // Inputs para indicadores de pixeles
        const barLengthInput = document.getElementById('barLength');
        const barThicknessInput = document.getElementById('barThickness');
        const barLengthVal = document.getElementById('barLengthVal');
        const barThicknessVal = document.getElementById('barThicknessVal');
        const borderWidthInput = document.getElementById('borderWidth');
        const borderWidthVal = document.getElementById('borderWidthVal');

        let animationId;

        // Actualizar indicadores numéricos en tiempo real
        barLengthInput.oninput = () => {
            barLengthVal.textContent = `${barLengthInput.value}px`;
            draw(0.6);
        };
        barThicknessInput.oninput = () => {
            barThicknessVal.textContent = `${barThicknessInput.value}px`;
            draw(0.6);
        };
        borderWidthInput.oninput = () => {
            borderWidthVal.textContent = `${borderWidthInput.value}px`;
            draw(0.6);
        };

        function draw(progress) {
            const orientation = document.getElementById('orientation').value;
            const showCounter = document.getElementById('showCounter').value === "true";
            const mode = document.getElementById('mode').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const barLength = parseInt(barLengthInput.value);
            const barThickness = parseInt(barThicknessInput.value);
            const barColor = document.getElementById('barColor').value;
            const bgColor = document.getElementById('bgColor').value;
            const radius = parseInt(document.getElementById('borderRadius').value);
            const glow = parseInt(document.getElementById('glow').value);
            const borderColor = document.getElementById('borderColor').value;
            const borderWidth = parseInt(document.getElementById('borderWidth').value);

            let visualProgress = (mode === 'countup') ? progress : (1 - progress);
            let displaySeconds = (mode === 'countup') ? Math.floor(progress * duration) : Math.ceil((1 - progress) * duration);

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const w = (orientation === 'horizontal') ? barLength : barThickness;
            const h = (orientation === 'horizontal') ? barThickness : barLength;
            const x = (canvas.width - w) / 2;
            const y = (canvas.height - h) / 2;

            ctx.beginPath();
            ctx.roundRect(x, y, w, h, radius);
            ctx.fillStyle = '#4b4b4b';
            ctx.fill();
            if (borderWidth > 0) {
                ctx.strokeStyle = borderColor;
                ctx.lineWidth = borderWidth;
                ctx.stroke();
            }

            if (visualProgress > 0) {
                ctx.save();
                ctx.beginPath();
                if (orientation === 'horizontal') {
                    ctx.roundRect(x, y, w * visualProgress, h, radius);
                } else {
                    const currentH = h * visualProgress;
                    ctx.roundRect(x, y + (h - currentH), w, currentH, radius);
                }
                ctx.shadowBlur = glow;
                ctx.shadowColor = barColor;
                ctx.fillStyle = barColor;
                ctx.fill();
                ctx.restore();
            }

            if (showCounter) {
                const fontSize = Math.max(24, barThickness * 0.8);
                ctx.font = `bold ${fontSize}px Inter, Arial`;
                ctx.textAlign = "center";
                const textX = canvas.width / 2;
                const textY = (orientation === 'horizontal')
                    ? (y + h + fontSize + 40)
                    : (y + h + 40) + 40;

                // Fondo gris sólido detrás del número
                const textMetrics = ctx.measureText(displaySeconds);
                const padH = fontSize * 0.4;
                const padV = fontSize * 0.25;
                const bgW = textMetrics.width + padH * 2;
                const bgH = fontSize + padV * 2;
                const bgX = textX - bgW / 2;
                const bgY = textY - fontSize - padV + (fontSize * 0.15);
                const bgRadius = Math.min(8, bgH * 0.25);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#4b4b4b';
                ctx.beginPath();
                ctx.roundRect(bgX, bgY, bgW, bgH, bgRadius - 1);
                ctx.fill();


                // Relleno del texto
                ctx.fillStyle = "white";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "black";
                ctx.fillText(displaySeconds, textX, textY);
                ctx.shadowBlur = 0;
            }
        }

        function animate(duration, onFinish) {
            let startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / (duration * 1000), 1);
                draw(progress);
                if (progress < 1) animationId = requestAnimationFrame(step);
                else if (onFinish) onFinish();
            }
            animationId = requestAnimationFrame(step);
        }

        previewBtn.onclick = () => {
            cancelAnimationFrame(animationId);
            animate(parseFloat(document.getElementById('duration').value));
        };

        renderBtn.onclick = async () => {
            const duration = parseFloat(document.getElementById('duration').value);
            const stream = canvas.captureStream(60);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', videoBitsPerSecond: 5000000 });
            const chunks = [];
            recorder.ondataavailable = (e) => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `bar_${Date.now()}.webm`;
                a.click();
                renderBtn.disabled = false;
                status.style.display = 'none';
            };
            renderBtn.disabled = true;
            status.style.display = 'block';
            recorder.start();
            animate(duration, () => { setTimeout(() => recorder.stop(), 500); });
        };

        window.onload = () => draw(0.6);
    </script>
</body>

</html>
