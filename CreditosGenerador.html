<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Studio V1 - Vertical Scroll</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --accent: #22d3ee;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .back-nav {
            width: 100%;
            max-width: 1600px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-flex; align-items: center; padding: 8px 16px;
            background: #334155; color: #f8fafc; text-decoration: none;
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            transition: 0.2s; border: 1px solid #475569;
        }
        .back-btn:hover { background: #475569; transform: translateX(-3px); }

        .container {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
        }

        .controls {
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 92vh;
            overflow-y: auto;
        }

        .preview-area {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            max-height: 80vh;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            background: #000;
        }

        .control-group { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; font-weight: 600; margin-bottom: 6px; }
        
        textarea, input[type="text"], input[type="number"], input[type="color"] {
            width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; box-sizing: border-box; font-family: inherit;
        }

        textarea { height: 250px; resize: vertical; font-size: 0.85rem; }

        button {
            width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s;
            background: var(--primary); color: white;
        }

        #renderBtn { background: var(--success); }
        #renderBtn:disabled { background: #475569; opacity: 0.6; cursor: not-allowed; }

        .recording-status {
            color: #fb7185; font-size: 0.85rem; margin-top: 15px; display: none; text-align: center; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="back-nav"><a href="index.html" class="back-btn">← Volver al Menú Principal</a></div>

    <h1 style="font-weight: 800; margin-bottom: 20px;">Credit Studio V1</h1>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Parámetros de Video</label>
                <div style="display: flex; gap: 10px;">
                    <div>
                        <label>Segundos</label>
                        <input type="number" id="duration" value="10" min="2">
                    </div>
                    <div>
                        <label>Resolución</label>
                        <select id="quality" style="width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white;">
                            <option value="720">720p</option>
                            <option value="1080" selected>1080p</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label>Contenido de Créditos</label>
                <p style="font-size: 0.65rem; color: #94a3b8; margin-bottom: 8px;">Usa ":" para separar el rol del nombre.</p>
                <textarea id="creditsText">Título:
Imaginando el Mañana

Temática:
"Universo Null"

Creado y Dirigido por:
Alejandro Villafranco Desiderio

Concepto y Guion:
Generado con Gemini 3 Flash

Diseño de Personajes y Arte:
Nano Banana 2

Animación y Efectos Visuales:
Veo 3.1

Banda Sonora Original:
Lyria 3

Gracias por ver!</textarea>
            </div>

            <div class="control-group">
                <label>Estilo Visual</label>
                <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                    <div>
                        <label>Color Texto</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div>
                        <label>Color Fondo</label>
                        <input type="color" id="bgColor" value="#000000">
                    </div>
                </div>
                <label>Modo Fondo</label>
                <select id="bgMode" style="width: 100%; padding: 10px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white;">
                    <option value="solid">Sólido</option>
                    <option value="transparent">Transparente (PNG/Chroma)</option>
                </select>
            </div>

            <button id="previewBtn">Previsualizar Créditos</button>
            <button id="renderBtn">Exportar Video .webm</button>
            <div id="status" class="recording-status">● GRABANDO CRÉDITOS... ESPERA</div>
        </div>

        <div class="preview-area">
            <canvas id="canvas" width="1080" height="1920"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let animationId;

        function updateRes() {
            const quality = parseInt(document.getElementById('quality').value);
            canvas.width = quality === 1080 ? 1080 : 720;
            canvas.height = quality === 1080 ? 1920 : 1280;
            draw(0);
        }

        function draw(progress) {
            const bgMode = document.getElementById('bgMode').value;
            const bgColor = document.getElementById('bgColor').value;
            const textColor = document.getElementById('textColor').value;
            const textContent = document.getElementById('creditsText').value;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (bgMode === 'solid') {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            const lines = textContent.split('\n');
            const s = canvas.width / 1080;
            
            // Estilos de texto
            const roleSize = 40 * s;
            const nameSize = 65 * s;
            const spacing = 100 * s;
            
            // Calcular altura total del bloque de texto
            let totalTextHeight = 0;
            lines.forEach(line => {
                if(line.includes(':')) totalTextHeight += roleSize + nameSize + (30 * s);
                else if(line.trim() === '') totalTextHeight += spacing;
                else totalTextHeight += nameSize + (40 * s);
            });

            // Posición Y inicial basada en el progreso (scroll de abajo hacia arriba)
            // Empieza totalmente abajo y termina totalmente arriba
            let currentY = canvas.height - (progress * (canvas.height + totalTextHeight));

            ctx.textAlign = "center";
            lines.forEach(line => {
                if (line.includes(':')) {
                    const [role, name] = line.split(':');
                    
                    // Dibujar Rol (Pequeño)
                    ctx.fillStyle = textColor;
                    ctx.globalAlpha = 0.7;
                    ctx.font = `${roleSize}px Inter, sans-serif`;
                    ctx.fillText(role.trim(), canvas.width/2, currentY);
                    currentY += roleSize + (10 * s);

                    // Dibujar Nombre (Grande y Negrita)
                    ctx.globalAlpha = 1.0;
                    ctx.font = `bold ${nameSize}px Inter, sans-serif`;
                    ctx.fillText(name.trim(), canvas.width/2, currentY);
                    currentY += nameSize + (50 * s);
                } else if (line.trim() === '') {
                    currentY += spacing;
                } else {
                    // Texto simple o títulos
                    ctx.globalAlpha = 1.0;
                    ctx.font = `bold ${nameSize}px Inter, sans-serif`;
                    ctx.fillText(line.trim(), canvas.width/2, currentY);
                    currentY += nameSize + (40 * s);
                }
            });
        }

        function play(durationSec, onEnd) {
            const start = Date.now();
            const dur = durationSec * 1000;
            function loop() {
                const elapsed = Date.now() - start;
                const progress = elapsed / dur;
                
                draw(progress);

                if (progress < 1) {
                    animationId = requestAnimationFrame(loop);
                } else {
                    if (onEnd) onEnd();
                }
            }
            animationId = requestAnimationFrame(loop);
        }

        document.getElementById('previewBtn').onclick = () => {
            cancelAnimationFrame(animationId);
            play(parseFloat(document.getElementById('duration').value));
        };

        document.getElementById('renderBtn').onclick = async () => {
            const dur = parseFloat(document.getElementById('duration').value);
            const stream = canvas.captureStream(60);
            const rec = new MediaRecorder(stream, { 
                mimeType: 'video/webm; codecs=vp9', 
                videoBitsPerSecond: 15000000 
            });
            const chunks = [];

            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `creditos_${Date.now()}.webm`;
                a.click();
                document.getElementById('renderBtn').disabled = false;
                document.getElementById('status').style.display = 'none';
            };

            document.getElementById('renderBtn').disabled = true;
            document.getElementById('status').style.display = 'block';
            rec.start();
            play(dur, () => rec.stop());
        };

        document.getElementById('quality').onchange = updateRes;
        window.onload = updateRes;
    </script>
</body>
</html>
