<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Extractor Studio V3 - Smart Wrap</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --accent: #22d3ee;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .back-nav {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: #334155;
            color: #f8fafc;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid #475569;
        }

        .back-btn:hover {
            background: #475569;
            transform: translateX(-3px);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-weight: 800;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 14px;
            background: #242f42;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.5;
            resize: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .wrap-control-panel {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 12px;
            margin-bottom: 2px;
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #334155;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #f8fafc;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .limit-container {
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .limit-container input[type="number"] {
            width: 80px;
            padding: 6px 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            text-align: center;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            background: var(--primary);
            color: white;
            font-size: 0.95rem;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--success);
        }

        .stats {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--accent);
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="back-nav"><a href="index.html" class="back-btn">← Volver al Menú Principal</a></div>

    <div style="text-align: center; margin-bottom: 10px;">
        <h1>Question Extractor Studio V3</h1>
        <div class="subtitle">Extractor inteligente con delimitación automática de caracteres por línea</div>
    </div>

    <div class="container">
        <div class="card">
            <label for="inputText">Texto Origen / Transcripción</label>
            <textarea id="inputText"
                placeholder="Pega aquí tu texto, guion o transcripción de video...&#10;&#10;Ejemplo: ¿Qué hicieron hoy?. Estuvimos jugando en el parque. ¿Con quién? Con nuestro amigo Daniel."></textarea>

            <div class="wrap-control-panel">
                <label class="checkbox-container">
                    <input type="checkbox" id="enableWrap"> Habilitar delimitación
                </label>
                <div id="wrapLimitGroup" class="limit-container" style="opacity: 0.4; pointer-events: none;">
                    <span style="font-size: 0.8rem; color: #94a3b8;">Límite de caracteres:</span>
                    <input type="number" id="wrapLimit" value="30" min="10" max="300">
                </div>
            </div>

            <button id="extractBtn">Extraer Preguntas</button>
        </div>

        <div class="card">
            <label for="outputText">Preguntas Extraídas</label>
            <textarea id="outputText" readonly placeholder="Las preguntas procesadas aparecerán aquí..."></textarea>
            <button id="copyBtn" class="btn-success">Copiar Resultado</button>
            <div id="countStats" class="stats">Método de detección: Ninguno</div>
        </div>
    </div>

    <script>
        const inputTextArea = document.getElementById('inputText');
        const outputTextArea = document.getElementById('outputText');
        const extractBtn = document.getElementById('extractBtn');
        const copyBtn = document.getElementById('copyBtn');
        const countStats = document.getElementById('countStats');

        const enableWrapInput = document.getElementById('enableWrap');
        const wrapLimitGroup = document.getElementById('wrapLimitGroup');
        const wrapLimitInput = document.getElementById('wrapLimit');

        // Escuchar el cambio del checkbox para activar/desactivar visualmente el campo numérico
        enableWrapInput.onchange = () => {
            if (enableWrapInput.checked) {
                wrapLimitGroup.style.opacity = "1";
                wrapLimitGroup.style.pointerEvents = "auto";
            } else {
                wrapLimitGroup.style.opacity = "0.4";
                wrapLimitGroup.style.pointerEvents = "none";
            }
            if (inputTextArea.value.trim() !== "") doExtraction();
        };

        wrapLimitInput.oninput = () => {
            if (inputTextArea.value.trim() !== "") doExtraction();
        };

        // Función inteligente de ajuste de línea (Word Wrap seguro)
        function wrapText(str, maxWidth) {
            const words = str.split(' ');
            let lines = [];
            let currentLine = '';

            words.forEach(word => {
                // Caso extremo: si una palabra sola supera el ancho máximo asignado
                if (word.length > maxWidth && currentLine.trim() === '') {
                    lines.push(word);
                    return;
                }

                if ((currentLine + word).length > maxWidth) {
                    if (currentLine.trim() !== '') {
                        lines.push(currentLine.trim());
                    }
                    currentLine = word + ' ';
                } else {
                    currentLine += word + ' ';
                }
            });

            if (currentLine.trim() !== '') {
                lines.push(currentLine.trim());
            }

            return lines.join('\n');
        }

        function doExtraction() {
            const text = inputTextArea.value;
            const isWrapEnabled = enableWrapInput.checked;
            const maxChars = parseInt(wrapLimitInput.value) || 30;

            let questions = [];
            let methodUsed = "Ninguno";

            // CAPA 1: Estructura tradicional ¿ ... ?
            const regexFull = /¿[^?]+\?/g;
            let matches = text.match(regexFull);

            if (matches && matches.length > 0) {
                questions = matches.map(q => q.replace(/\s+/g, ' ').trim());
                methodUsed = "Signos Estándar (¿ ?)";
            } else {
                // CAPA 2: Solo signo de cierre ?
                const regexEnd = /[^.!?\n\r]+\?/g;
                matches = text.match(regexEnd);

                if (matches && matches.length > 0) {
                    questions = matches.map(q => {
                        let clean = q.replace(/\s+/g, ' ').trim();
                        clean = clean.replace(/^[^¿A-Za-z0-9ÁÉÍÓÚáéíóú]+/g, '');
                        if (!clean.startsWith('¿')) clean = '¿' + clean;
                        return clean;
                    });
                    methodUsed = "Signos Parciales ( Solo ? )";
                } else {
                    // CAPA 3: Modo Transcripción Cruda por Palabras Clave
                    const phrases = text.split(/[.\n,]+/);
                    const questionWords = /^(¿)?\s*(qué|que|quien|quién|cuál|cual|cómo|como|cuándo|cuando|dónde|donde|por qué|por que|cuánto|cuanto)/i;

                    phrases.forEach(p => {
                        let cleanPhrase = p.replace(/\s+/g, ' ').trim();
                        if (questionWords.test(cleanPhrase)) {
                            if (!cleanPhrase.startsWith('¿')) cleanPhrase = '¿' + cleanPhrase;
                            if (!cleanPhrase.endsWith('?')) cleanPhrase = cleanPhrase + '?';
                            questions.push(cleanPhrase);
                        }
                    });
                    if (questions.length > 0) {
                        methodUsed = "Palabras Clave (Modo Transcripción)";
                    }
                }
            }

            // Formatear y renderizar resultados
            if (questions.length > 0) {
                outputTextArea.value = questions.map(q => {
                    if (isWrapEnabled) {
                        return wrapText(q, maxChars) + " ...";
                    } else {
                        return `${q} ...`;
                    }
                }).join('\n');
                countStats.textContent = `Método: ${methodUsed} | Encontradas: ${questions.length}`;
            } else {
                outputTextArea.value = "";
                countStats.textContent = "Preguntas encontradas: 0. Revisa el texto de entrada.";
            }
        }

        extractBtn.onclick = doExtraction;

        copyBtn.onclick = () => {
            if (!outputTextArea.value) return;
            outputTextArea.select();
            document.execCommand('copy');

            const originalText = copyBtn.textContent;
            copyBtn.textContent = "¡Copiado con éxito!";
            setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
        };
    </script>
</body>

</html>
