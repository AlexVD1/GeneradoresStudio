<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic Video Studio - Trivia V1</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --accent: #22d3ee;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .back-nav {
            width: 100%;
            max-width: 1600px;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: #334155;
            color: #f8fafc;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid #475569;
        }

        .back-btn:hover {
            background: #475569;
            transform: translateX(-3px);
        }

        .container {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
            max-width: 1600px;
            width: 100%;
        }

        .controls {
            background: var(--panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 92vh;
            overflow-y: auto;
        }

        .preview-area {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            max-width: 100%;
            max-height: 80vh;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            background: #000;
        }

        .control-group {
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 6px;
        }

        select,
        input[type="text"],
        input[type="number"],
        input[type="color"],
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .option-card {
            background: #242f42;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid #334155;
        }

        .option-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .correct-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            color: var(--success);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            background: var(--primary);
            color: white;
        }

        #renderBtn {
            background: var(--success);
        }

        #renderBtn:disabled {
            background: #475569;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .recording-status {
            color: #fb7185;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="back-nav"><a href="index.html" class="back-btn">← Volver al Menú Principal</a></div>

    <h1 style="font-weight: 800; margin-bottom: 20px;">Graphic Video Studio</h1>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>Formato y Animación</label>
                <select id="orientation">
                    <option value="cuadrado">Cuadrado (1080x1080)</option>
                    <option value="horizontal">Horizontal (1920x1080)</option>
                    <option value="vertical" selected>Vertical (1080x1920)</option>
                </select>
                <div style="display: flex; gap: 10px; margin-top: 8px;">
                    <div>
                        <label>Animación (s)</label>
                        <input type="number" id="duration" value="6" min="1">
                    </div>
                    <div>
                        <label>Final (s)</label>
                        <input type="number" id="revealDuration" value="2" min="1">
                    </div>
                    <div>
                        <label>Tipo</label>
                        <select id="animType">
                            <option value="pulse">Pulso</option>
                            <option value="float">Flotante</option>
                            <option value="slide">Slide</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="slideControls">
                <div class="control-group">
                    <label>Título e Imagen</label>
                    <input type="text" id="slideTitle" value="¿CUÁL ES CORRECTA?" style="margin-bottom:8px">
                    <input type="file" id="mainImage" accept="image/*">
                </div>
            </div>

            <div class="control-group">
                <label>Opciones de Trivia</label>
                <div class="option-card">
                    <div class="option-header"><span>OPCIÓN A</span><label class="correct-toggle"><input type="checkbox"
                                id="correctA"> ¿Correcta?</label></div>
                    <div style="display: flex; gap: 8px;"><input type="text" id="textA" value="Opción Incorrecta"><input
                            type="color" id="colorA" value="#22c55e" style="width:45px"></div>
                </div>
                <div class="option-card">
                    <div class="option-header"><span>OPCIÓN B</span><label class="correct-toggle"><input type="checkbox"
                                id="correctB" checked> ¿Correcta?</label></div>
                    <div style="display: flex; gap: 8px;"><input type="text" id="textB"
                            value="Respuesta Correcta"><input type="color" id="colorB" value="#3b82f6"
                            style="width:45px"></div>
                </div>
                <div class="option-card">
                    <div class="option-header"><span>OPCIÓN C</span><label class="correct-toggle"><input type="checkbox"
                                id="correctC"> ¿Correcta?</label></div>
                    <div style="display: flex; gap: 8px;"><input type="text" id="textC" value="Otra Incorrecta"><input
                            type="color" id="colorC" value="#ef4444" style="width:45px"></div>
                </div>
            </div>


            <div class="control-group">
                <label>Ajuste de Texto</label>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-size: 0.6rem;">Tamaño de Fuente Opciones</label>
                    <input type="range" id="optFontSize" min="10" max="100" value="40">
                </div>
            </div>
            <div class="control-group">
                <label>Escena</label>
                <select id="bgMode">
                    <option value="solid">Fondo Sólido</option>
                    <option value="transparent">Transparente (Chroma)</option>
                </select>
                <input type="color" id="bgColor" value="#00ff00" style="margin-top:8px;">
            </div>

            <button id="previewBtn">Previsualizar Animación</button>
            <button id="renderBtn">Exportar Video .webm</button>
            <div id="status" class="recording-status">● GRABANDO VIDEO... ESPERA</div>
        </div>

        <div class="preview-area">
            <canvas id="canvas" width="1080" height="1920"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let mainImgObj = null;
        let animationId;

        // Reloj sintético para renderizado offline (null = usa Date.now() real)
        let _animTime = null;
        function getAnimTime() { return _animTime !== null ? _animTime : Date.now(); }

        function updateRes() {
            const orientation = document.getElementById('orientation').value;
            if (orientation === 'cuadrado') { canvas.width = 1080; canvas.height = 1080; }
            else if (orientation === 'horizontal') { canvas.width = 1920; canvas.height = 1080; }
            else { canvas.width = 1080; canvas.height = 1920; }
            draw(0);
        }

        document.getElementById('mainImage').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { mainImgObj = img; draw(0); };
                img.src = ev.target.result;
            };
            if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        };

        function draw(progress) {
            const orientation = document.getElementById('orientation').value;
            const bgMode = document.getElementById('bgMode').value;
            const bgColor = document.getElementById('bgColor').value;
            const animType = document.getElementById('animType').value;
            const title = document.getElementById('slideTitle').value;
            const boxColor = "#ffffff";
            const textColor = "#333333";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (bgMode === 'solid') { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height); }

            const options = ['A', 'B', 'C'].map(l => ({
                l,
                t: document.getElementById(`text${l}`).value,
                c: document.getElementById(`color${l}`).value,
                isCorrect: document.getElementById(`correct${l}`).checked
            })).filter(o => o.t.trim() !== "");

            const s = Math.min(canvas.width, canvas.height) / 1080;

            // Lógica de Renderizado por Formato
            if (orientation === 'vertical') {
                // Título
                ctx.fillStyle = "#ffffff"; ctx.font = `bold ${70 * s}px Inter, Arial`;
                ctx.textAlign = "center"; ctx.fillText(title, canvas.width / 2, 120 * s);

                // Imagen Central
                const iw = 920 * s, ih = 800 * s, ix = (canvas.width - iw) / 2, iy = 200 * s;
                drawMainImage(ix, iy, iw, ih, progress, animType, s);

                // Opciones
                const bStartY = iy + ih + 80 * s;
                const capsW_v = canvas.width - 160 * s, capsH_v = 160 * s;
                const unifiedFs_v = calcUnifiedFontSize(options, capsW_v, capsH_v, s);
                options.forEach((opt, i) => drawCapsule(opt, 80 * s, bStartY + (i * 200 * s), capsW_v, capsH_v, progress, animType, s, unifiedFs_v));
            } else if (orientation === 'horizontal') {
                ctx.fillStyle = "#ffffff"; ctx.font = `bold ${60 * s}px Inter, Arial`;
                ctx.textAlign = "left"; ctx.fillText(title, 80 * s, 100 * s);

                const iw = 800 * s, ih = 800 * s, ix = 80 * s, iy = 150 * s;
                drawMainImage(ix, iy, iw, ih, progress, animType, s);

                const bx = 950 * s;
                const totalH = options.length * 200 * s;
                const bStartY = iy + (ih - totalH) / 2;
                const capsW_h = canvas.width - bx - 80 * s, capsH_h = 160 * s;
                const unifiedFs_h = calcUnifiedFontSize(options, capsW_h, capsH_h, s);
                options.forEach((opt, i) => drawCapsule(opt, bx, bStartY + (i * 200 * s), capsW_h, capsH_h, progress, animType, s, unifiedFs_h));
            } else {
                const totalH = options.length * 220 * s;
                const bStartY = (canvas.height - totalH) / 2;
                const capsW_sq = canvas.width - 200 * s, capsH_sq = 180 * s;
                const unifiedFs_sq = calcUnifiedFontSize(options, capsW_sq, capsH_sq, s);
                options.forEach((opt, i) => drawCapsule(opt, 100 * s, bStartY + (i * 220 * s), capsW_sq, capsH_sq, progress, animType, s, unifiedFs_sq));
            }
        }

        function drawMainImage(x, y, w, h, progress, animType, s) {
            let offY = 0, offX = 0, scale = 1;
            if (progress < 1) {
                const t = getAnimTime() / 400;
                if (animType === 'float') offY = Math.sin(t) * (20 * s);
                if (animType === 'pulse') scale = 1 + Math.sin(t) * 0.02;
                if (animType === 'slide') offX = Math.cos(t) * (30 * s);
            }

            ctx.save();
            ctx.translate(x + w / 2 + offX, y + h / 2 + offY);
            ctx.scale(scale, scale);
            ctx.translate(-(x + w / 2), -(y + h / 2));

            ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 30 * s; ctx.shadowOffsetY = 15 * s;
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 20 * s);
            ctx.fillStyle = "#ffffff"; ctx.fill();
            ctx.clip();
            if (mainImgObj) {
                const sc = Math.max(w / mainImgObj.width, h / mainImgObj.height);
                ctx.drawImage(mainImgObj, x + (w - mainImgObj.width * sc) / 2, y + (h - mainImgObj.height * sc) / 2, mainImgObj.width * sc, mainImgObj.height * sc);
            } else { ctx.fillStyle = "#334155"; ctx.fillRect(x, y, w, h); }
            ctx.restore();
        }

        /**
         * Pre-calculates the minimum fontSize shared across all options
         * so every capsule uses the same text size (visual consistency).
         */
        function calcUnifiedFontSize(options, capsW, capsH, s) {
            let minFs = Infinity;
            const sliderRatio = document.getElementById('optFontSize').value / 100;
            const MIN_FONT = Math.max(12, 12 * s);
            for (const opt of options) {
                // Approximate cx/r geometry (mirrors drawCapsule)
                const approxBadgeX = 85 * s;  // cx relative to capsule x
                const approxR = capsH / 2.1;
                const textMaxW = capsW - (approxBadgeX - 0 + approxR + 60 * s);
                const paddingV = capsH * 0.12;
                const textMaxH = capsH - paddingV * 2;
                const base = capsH * sliderRatio;
                const { fontSize } = fitText(ctx, opt.t, textMaxW, textMaxH, base, MIN_FONT);
                if (fontSize < minFs) minFs = fontSize;
            }
            return minFs === Infinity ? (capsH * sliderRatio) : minFs;
        }

        /**
         * Wraps text into lines fitting maxWidth, returns array of line strings.
         */
        function wrapText(ctx, text, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let current = '';
            for (const word of words) {
                const test = current ? current + ' ' + word : word;
                if (ctx.measureText(test).width <= maxWidth) {
                    current = test;
                } else {
                    if (current) lines.push(current);
                    // If a single word is too wide, it still goes on its own line
                    current = word;
                }
            }
            if (current) lines.push(current);
            return lines;
        }

        /**
         * Two-phase smart text fit inside a capsule text area.
         * Phase 1 – wrap lines to fill vertical space at original font size.
         * Phase 2 – shrink font-size only when wrapped text still overflows height.
         * Returns { lines, fontSize }.
         */
        function fitText(ctx, text, maxW, maxH, baseFontSize, minFontSize) {
            let fontSize = baseFontSize;
            const lineHeight = () => fontSize * 1.25;

            // Phase 1: try wrapping at current font size
            ctx.font = `bold ${fontSize}px Inter, Arial`;
            let lines = wrapText(ctx, text, maxW);
            let totalH = lines.length * lineHeight();

            // If it fits, great – return as is
            if (totalH <= maxH) return { lines, fontSize };

            // Phase 2: reduce font-size until it fits, down to minFontSize
            while (totalH > maxH && fontSize > minFontSize) {
                fontSize = Math.max(fontSize - 1, minFontSize);
                ctx.font = `bold ${fontSize}px Inter, Arial`;
                lines = wrapText(ctx, text, maxW);
                totalH = lines.length * lineHeight();
            }
            return { lines, fontSize };
        }

        function drawCapsule(opt, x, y, w, h, progress, animType, s, overrideFontSize) {
            let offY = 0, offX = 0, scale = 1;
            if (progress < 1) {
                const t = getAnimTime() / 400 + opt.l.charCodeAt(0);
                if (animType === 'float') offY = Math.sin(t) * (15 * s);
                if (animType === 'pulse') scale = 1 + Math.sin(t) * 0.015;
                if (animType === 'slide') offX = Math.cos(t) * (25 * s);
            }

            ctx.save();
            ctx.translate(x + w / 2 + offX, y + h / 2 + offY);
            ctx.scale(scale, scale);
            ctx.translate(-(x + w / 2), -(y + h / 2));

            // Cuerpo de la cápsula
            ctx.beginPath(); ctx.roundRect(x + 50 * s, y, w - 50 * s, h, h / 2);
            if (progress >= 1 && !opt.isCorrect) {
                ctx.fillStyle = "#334155"; // Gris sólido si es incorrecta
            } else {
                ctx.fillStyle = "#ffffff";
            }
            ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 15 * s; ctx.shadowOffsetY = 8 * s;
            ctx.fill();
            ctx.shadowColor = "transparent";

            // Badge
            const cx = x + 85 * s, cy = y + h / 2, r = h / 2.1;
            ctx.beginPath(); ctx.arc(cx, cy, r + 5 * s, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff"; ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);

            if (progress >= 1 && opt.isCorrect) ctx.fillStyle = "#22c55e"; // Verde al final
            else if (progress >= 1 && !opt.isCorrect) ctx.fillStyle = "#64748b"; // Gris badge
            else ctx.fillStyle = opt.c;
            ctx.fill();

            // Letra o Paloma
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            if (progress >= 1 && opt.isCorrect) {
                ctx.font = `bold ${h * 0.6}px Arial`; ctx.fillText("✓", cx, cy);
            } else {
                ctx.font = `bold ${h * 0.5}px Inter, Arial`; ctx.fillText(opt.l, cx, cy);
            }


            // --- Two-phase smart text fit ---
            const textX = cx + r + 30 * s;           // left edge of text area
            const textMaxW = w - (cx - x + r + 60 * s); // available width
            const paddingV = h * 0.12;                  // vertical padding inside capsule
            const textMaxH = h - paddingV * 2;          // available height
            const MIN_FONT = Math.max(12, 12 * s);      // readable floor

            let lines, fontSize;
            if (overrideFontSize !== undefined) {
                // Unified size supplied – wrap at that size first
                fontSize = overrideFontSize;
                ctx.font = `bold ${fontSize}px Inter, Arial`;
                lines = wrapText(ctx, opt.t, textMaxW);
                // Safety check: if wrapped text still overflows height, shrink (Phase 2)
                let totalHCheck = lines.length * fontSize * 1.25;
                while (totalHCheck > textMaxH && fontSize > MIN_FONT) {
                    fontSize = Math.max(fontSize - 1, MIN_FONT);
                    ctx.font = `bold ${fontSize}px Inter, Arial`;
                    lines = wrapText(ctx, opt.t, textMaxW);
                    totalHCheck = lines.length * fontSize * 1.25;
                }
            } else {
                // No override: run the full two-phase fit independently
                const baseFontSize = h * (document.getElementById('optFontSize').value / 100);
                ctx.font = `bold ${baseFontSize}px Inter, Arial`;
                ({ lines, fontSize } = fitText(ctx, opt.t, textMaxW, textMaxH, baseFontSize, MIN_FONT));
            }

            const lineH = fontSize * 1.25;
            const totalTextH = lines.length * lineH;

            ctx.fillStyle = (progress >= 1 && !opt.isCorrect) ? "#94a3b8" : "#333333";
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            ctx.font = `bold ${fontSize}px Inter, Arial`;

            // Center block vertically inside capsule
            const blockStartY = cy - totalTextH / 2 + lineH / 2;
            lines.forEach((line, idx) => {
                ctx.fillText(line, textX, blockStartY + idx * lineH);
            });


            ctx.restore();
        }

        function play(durationSec, onEnd) {
            const start = Date.now();
            const dur = durationSec * 1000;
            const revealTime = parseFloat(document.getElementById('revealDuration').value) * 1000;
            function loop() {
                const elapsed = Date.now() - start;
                if (elapsed < dur) { draw(elapsed / dur); animationId = requestAnimationFrame(loop); }
                else { draw(1); if (elapsed - dur < revealTime) animationId = requestAnimationFrame(loop); else if (onEnd) onEnd(); }
            }
            animationId = requestAnimationFrame(loop);
        }

        // Export loop usa setTimeout en lugar de rAF para que NO se pause al cambiar de pestaña.
        let exportTimeoutId = null;
        function playForExport(durationSec, onEnd) {
            cancelAnimationFrame(animationId); // detener preview si estaba activo
            if (exportTimeoutId) clearTimeout(exportTimeoutId);

            const start = Date.now();
            const dur = durationSec * 1000;
            const revealTime = parseFloat(document.getElementById('revealDuration').value) * 1000;
            const FRAME_MS = 1000 / 60; // ~16.67 ms → 60 fps

            function loop() {
                const elapsed = Date.now() - start;
                if (elapsed < dur) {
                    draw(elapsed / dur);
                    exportTimeoutId = setTimeout(loop, FRAME_MS);
                } else {
                    draw(1);
                    if (elapsed - dur < revealTime) {
                        exportTimeoutId = setTimeout(loop, FRAME_MS);
                    } else {
                        exportTimeoutId = null;
                        if (onEnd) onEnd();
                    }
                }
            }
            loop(); // primera llamada sin retraso para capturar el frame 0 inmediatamente
        }

        document.getElementById('previewBtn').onclick = () => {
            if (exportTimeoutId) { clearTimeout(exportTimeoutId); exportTimeoutId = null; }
            cancelAnimationFrame(animationId);
            play(parseFloat(document.getElementById('duration').value));
        };

        document.getElementById('renderBtn').onclick = async () => {
            const statusEl = document.getElementById('status');
            const renderBtn = document.getElementById('renderBtn');

            // --- Exportación instantánea con WebCodecs ---
            if (!window.VideoEncoder) {
                alert('Tu navegador no soporta exportación rápida.\nUsa Chrome 94+ o Edge 94+.');
                return;
            }

            const dur = parseFloat(document.getElementById('duration').value);
            const revealSec = parseFloat(document.getElementById('revealDuration').value);
            const totalSec = dur + revealSec;
            const FPS = 60;
            const totalFrames = Math.ceil(totalSec * FPS);
            const W = canvas.width, H = canvas.height;

            // Detener animación en curso
            cancelAnimationFrame(animationId);
            if (exportTimeoutId) { clearTimeout(exportTimeoutId); exportTimeoutId = null; }

            renderBtn.disabled = true;
            statusEl.textContent = '⚡ GENERANDO VIDEO...';
            statusEl.style.display = 'block';

            try {
                // Cargar muxer dinámicamente (no requiere instalación)
                const { Muxer, ArrayBufferTarget } =
                    await import('https://cdn.jsdelivr.net/npm/webm-muxer@3/+esm');

                const muxer = new Muxer({
                    target: new ArrayBufferTarget(),
                    video: { codec: 'V_VP9', width: W, height: H, frameRate: FPS },
                    firstTimestampBehavior: 'offset'
                });

                const encoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: (e) => { throw e; }
                });
                encoder.configure({
                    codec: 'vp09.00.10.08',
                    width: W, height: H,
                    bitrate: 15_000_000,
                    framerate: FPS
                });

                const FRAME_US = Math.round(1_000_000 / FPS); // duración de frame en microsegundos

                for (let i = 0; i < totalFrames; i++) {
                    const elapsedMs = i * (1000 / FPS);
                    const elapsedDur = elapsedMs / (dur * 1000); // 0..1 durante la animación

                    _animTime = elapsedMs; // reloj sintético para las animaciones
                    draw(elapsedDur < 1 ? elapsedDur : 1);

                    const frame = new VideoFrame(canvas, { timestamp: i * FRAME_US });
                    encoder.encode(frame, { keyFrame: i % (FPS * 2) === 0 });
                    frame.close();

                    // Ceder al navegador cada 30 frames para actualizar el porcentaje
                    if (i % 30 === 0) {
                        const pct = Math.round((i / totalFrames) * 100);
                        statusEl.textContent = `⚡ GENERANDO: ${pct}%`;
                        await new Promise(r => setTimeout(r, 0));
                    }
                }

                statusEl.textContent = '⚡ CODIFICANDO...';
                await encoder.flush();
                muxer.finalize();

                const blob = new Blob([muxer.target.buffer], { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `trivia_video_${Date.now()}.webm`;
                a.click();

            } catch (err) {
                console.error('Export error:', err);
                alert('Error al exportar: ' + err.message);
            } finally {
                _animTime = null;
                renderBtn.disabled = false;
                statusEl.style.display = 'none';
            }
        };

        document.getElementById('orientation').onchange = updateRes;
        window.onload = updateRes;
    </script>
</body>

</html>
